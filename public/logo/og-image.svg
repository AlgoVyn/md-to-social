<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007acc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005a9e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Logo mask for holes -->
    <mask id="ring-holes">
      <rect width="200" height="200" fill="white" />
      <circle cx="44" cy="113" r="6" fill="black" />
      <circle cx="156" cy="113" r="6" fill="black" />
      <circle cx="100" cy="147" r="6" fill="black" />
    </mask>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)" />
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="rgba(255,255,255,0.05)" />
  <circle cx="1100" cy="530" r="200" fill="rgba(255,255,255,0.03)" />
  
  <!-- Logo Group (left side) -->
  <g transform="translate(60, 160) scale(2)" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 100 41 L 100 113 M 72 85 L 100 113 L 128 85" />
    <g mask="url(#ring-holes)">
      <path d="M 44 113 C 64 113, 85 131, 100 147" />
      <path d="M 156 113 C 136 113, 115 131, 100 147" />
      <circle cx="44" cy="113" r="12" />
      <circle cx="156" cy="113" r="12" />
      <circle cx="100" cy="147" r="12" />
    </g>
  </g>
  
  <!-- Title -->
  <text x="780" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">MarkSocial</text>
  
  <!-- Subtitle -->
  <text x="780" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.9)" text-anchor="middle">Convert Markdown to Social Media Posts</text>
  
  <!-- Platform badges -->
  <g transform="translate(780, 430)" text-anchor="middle">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.7)">LinkedIn • Twitter/X • Instagram • Threads • Mastodon • Bluesky</text>
    <text x="0" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.7)">Discord • Reddit • YouTube • Facebook • TikTok • Telegram</text>
  </g>
  
  <!-- Free badge -->
  <g transform="translate(1080, 60)">
    <rect x="-80" y="-20" width="100" height="40" rx="20" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
    <text x="-30" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">100% FREE</text>
  </g>
</svg>
